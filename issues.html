<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
     <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <!-- tailwind + daisy -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!-- fonts -->
 <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

<!-- icons -->
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="bg-[#f8fafc]">
 <header>
    <nav class="">
        <div class="flex flex-col sm:flex-row items-center justify-between w-11/12 mx-auto p-2 gap-2">
            <div class="logo flex items-center gap-2"><img class="w-9" src="./assets/github-logo.png" 
            alt="">
            <h2>GitHub Issues Tracker</h2>
        </div>
            <div class="search">
                <div class="join">
    <div>
    <label class="input validator join-item">
     
      <input id="searchInput" type="email" placeholder="Search Issue" required />
    </label>
    <div class="validator-hint hidden">Search</div>
  </div>
  <button onclick="searchIssue()" class="btn btn-primary join-item">+ New Issue</button>
</div></div>
        </div>
    </nav>
 </header>
 <!--All buttons here-->
 <div id="buttons" class="w-11/12 mx-auto p-3 bg-white shadow-xl flex flex-wrap gap-2 items-center mt-3">
    <button id="allBtn" class="px-3 py-2 bg-[#3b82f6] text-white rounded-md w-[80px] cursor-pointer hover:bg-blue-600 hover:scale-105 transition duration-200">All</button>
    <button id="openBtn" class="px-3 py-2 bg-[#e4e4e7] text-[#64748b] rounded-md w-[80px] cursor-pointer hover:scale-105 transition duration-200">Open</button>
    <button id="closeBtn" class="px-3 py-2 bg-[#e4e4e7] text-[#64748b] rounded-md w-[80px] cursor-pointer hover:scale-105 transition duration-200">Closed</button>
</div>

  <!--Mainsection-->
 <main class="w-11/12 mx-auto p-3 bg-white shadow-sm mt-3">
    <div class="flex justify-between shadow-xl border-b border-b-gray-300 ">
        <div class="left flex gap-2 items-center">
            <div class=" ">
                <img src="./assets/Aperture.png" alt="">
            </div>
            <div>
                <h3 id="issueCount" class="text-[20px] font-semibold text-[#1f2937]">50 Issues</h3>
                <p class="text-[#64748b] text-[16px]">Track and manage your project issues</p>
            </div>
        </div>
        <div class="right flex gap-2">
            <div class="flex items-center"><img src="./assets/Open-Status.png" alt="">
                <p>Open</p>
            </div>
            <div class="flex items-center"><img src="./assets/Closed-Status.png" alt="">
                <p>Closed</p>
            </div>
        </div>
    </div>

    <div id="loadingSpinner" class="hidden flex justify-center items-center py-10">
    <div class="animate-spin rounded-full h-10 w-10 border-t-4 border-b-4 border-blue-500"></div>
    </div>
    
     <!--card div-->
    <div id="cardsContainer" class="card card-body shadow-2xl grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-2 bg-[#fbfbfb]">
       
    </div>
 </main>

  <!-- Open the modal using ID.showModal() method -->
  <!--<button class="btn" onclick="my_modal_5.showModal()">open modal</button>-->

<dialog id="card_modal" class="modal modal-bottom sm:modal-middle">
  <div class="modal-box p-3 sm:p-5">
   <div id="detailsContainer" class="overflow-y-auto max-h-[80vh]"></div>
    <div class="modal-action">
      <form method="dialog">
        <!-- if there is a button in form, it will close the modal -->
        <button class="btn">Close</button>
      </form>
    </div>
  </div>
</dialog>


    
 <script src="./script/issues.js"></script>   
</body>
</html>
