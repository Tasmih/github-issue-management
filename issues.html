 <header>

        </div>
            <div class="search">
                <div class="join">
    <div class=>

</div></div>
        </div>

 <div id="buttons " class="w-11/12 mx-auto p-3 bg-white shadow-xl flex gap-2 items-center mt-3">
    <button onclick="toggleStyle('all-filter-btn')" id="all-filter-btn" class="px-3 py-2 bg-[#3b82f6] text-white rounded-md w-[80px]">All</button>
     <button onclick="toggleStyle('all-filter-btn')" id="all-filter-btn" class="px-3 py-2 bg-[#e4e4e7] text-[#64748b] rounded-md w-[80px]">Open</button>
      <button onclick="toggleStyle('all-filter-btn')" id="all-filter-btn" class="px-3 py-2 bg-[#e4e4e7] text-[#64748b] rounded-md w-[80px]">Closed</button>
 </div>
